<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MORNING TW — 台中早餐地圖</title>
  <meta name="description" content="台中人自己整理的在地早餐地圖。傳統老店、市場早點、在地限定，找到你的台中早晨第一口。">
  <meta property="og:title" content="MORNING TW — 台中早餐地圖">
  <meta property="og:description" content="台中人才知道的在地早餐，傳統市場、老字號、在地限定。">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .map-pin {
      width: 32px; height: 32px;
      background: #fff;
      border: 2px solid var(--accent);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .map-pin span { transform: rotate(45deg); font-size: 14px; line-height: 1; }
    .map-pin--featured { background: var(--accent); border-color: var(--accent-dark); }
    .map-pin--active { transform: rotate(-45deg) scale(1.3); box-shadow: 0 4px 16px rgba(245,166,35,0.5); }
    .leaflet-container { font-family: inherit; }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <header class="nav">
    <div class="nav__logo">MORNING <em>TW</em></div>
    <nav class="nav__links">
      <a href="#list-section">早餐店</a>
      <a href="#map-section">地圖</a>
    </nav>
    <a href="#hero" class="nav__cta">找早餐 ↑</a>
  </header>

  <!-- ═══ HERO ═══ -->
  <section class="hero" id="hero">
    <div class="hero__inner">
      <div class="hero__badge">🥚 台中早餐地圖</div>
      <h1 class="hero__title">MORNING TW<br><em>找早餐</em></h1>
      <p class="hero__desc">台中人自己整理的在地早餐。傳統老店、市場早點、在地限定。<br>讓外縣市人看了羨慕的台中早晨。</p>

      <!-- BIG SEARCH -->
      <div class="hero__search" role="search">
        <span class="hero__search-icon">🔍</span>
        <input
          id="search-input"
          type="search"
          placeholder="搜尋店名、地區或食物..."
          autocomplete="off"
          aria-label="搜尋早餐店"
        >
        <button id="search-btn" class="hero__search-btn">搜尋</button>
      </div>
      <a href="#list-section" class="hero__browse">瀏覽所有早餐店 →</a>
    </div>

    <!-- MARQUEE -->
    <div class="marquee-wrap" aria-hidden="true">
      <div class="marquee">
        <div class="marquee__track" id="marquee-track">
          <!-- filled by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- ═══ FILTER + LIST ═══ -->
  <section class="list-section" id="list-section">
    <div class="list-section__inner">

      <!-- SORT BAR -->
      <div class="sort-bar" id="sort-bar">
        <span class="sort-bar__label">排序</span>
        <button class="sort-tab sort-tab--active" data-sort="popular">🔥 人氣排行</button>
        <button class="sort-tab" data-sort="featured">⭐ 官方精選</button>
        <button class="sort-tab" data-sort="distance">📍 距離最近</button>
      </div>

      <!-- FILTER BAR -->
      <div class="filter-bar">
        <div class="filter-bar__chips" id="type-chips">
          <button class="chip chip--active" data-type="all">全部</button>
          <button class="chip" data-type="egg">🥚 蛋餅燒餅</button>
          <button class="chip" data-type="rice">🍚 飯糰粥</button>
          <button class="chip" data-type="soup">🍜 湯品</button>
          <button class="chip" data-type="local">📍 在地特色</button>
          <button class="chip" data-type="drink">🫘 豆漿飲料</button>
        </div>
        <div class="filter-bar__chips" id="district-chips" style="margin-top:8px">
          <button class="chip chip--district chip--active" data-district="all">全台中</button>
          <button class="chip chip--district" data-district="南區">南區</button>
          <button class="chip chip--district" data-district="南屯區">南屯</button>
          <button class="chip chip--district" data-district="中區">中區</button>
          <button class="chip chip--district" data-district="西區">西區</button>
          <button class="chip chip--district" data-district="北區">北區</button>
          <button class="chip chip--district" data-district="西屯區">西屯</button>
          <button class="chip chip--district" data-district="北屯區">北屯</button>
        </div>
        <div class="filter-bar__stats" id="stats-bar">
          找到 <strong id="stats-count">0</strong><span id="stats-label"> 間</span>
        </div>
      </div>

      <!-- GRID -->
      <div class="shop-grid" id="breakfast-list">
        <p class="loading-msg">載入中⋯</p>
      </div>

    </div>
  </section>

  <!-- ═══ MAP ═══ -->
  <section class="map-section" id="map-section">
    <div class="map-section__inner">
      <div class="map-section__header">
        <h2>台中早餐地圖 <span>點圖示看店家</span></h2>
        <button class="btn-locate" id="btn-locate">📍 找我附近的</button>
      </div>
      <div class="map-wrap">
        <div id="map-container"></div>
      </div>
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="footer__logo">MORNING <em>TW</em></div>
    <p>台中人自己整理的在地早餐地圖</p>
    <p class="footer__copy">© 2026 MORNING TW</p>
  </footer>

  <!-- MOBILE BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="bnav__item bnav__item--active" onclick="window.scrollTo({top:0,behavior:'smooth'})">
      <span>🏠</span>首頁
    </button>
    <button class="bnav__item" onclick="document.getElementById('list-section').scrollIntoView({behavior:'smooth'})">
      <span>🍳</span>早餐店
    </button>
    <button class="bnav__item" onclick="document.getElementById('search-input').focus();window.scrollTo({top:0,behavior:'smooth'})">
      <span>🔍</span>搜尋
    </button>
    <button class="bnav__item" onclick="document.getElementById('btn-locate').click()">
      <span>📍</span>附近
    </button>
  </nav>

  <!-- SHEET -->
  <div class="sheet-overlay" id="sheet-overlay"></div>
  <div class="bottom-sheet" id="bottom-sheet" role="dialog" aria-modal="true"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
