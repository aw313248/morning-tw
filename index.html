<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MORNING TW — 台中早餐地圖</title>
  <meta name="description" content="台中人自己整理的在地早餐地圖。傳統老店、市場早點、在地限定，找到你的台中早晨第一口。">
  <meta property="og:title" content="MORNING TW — 台中早餐地圖">
  <meta property="og:description" content="台中人才知道的在地早餐，傳統市場、老字號、在地限定。">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F5A623">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MORNING TW">
  <style>
    .map-pin {
      width: 32px; height: 32px;
      background: #fff;
      border: 2px solid var(--accent);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .map-pin span { transform: rotate(45deg); font-size: 14px; line-height: 1; }
    .map-pin--featured { background: var(--accent); border-color: var(--accent-dark); }
    .map-pin--active { transform: rotate(-45deg) scale(1.3); box-shadow: 0 4px 16px rgba(245,166,35,0.5); }
    .leaflet-container { font-family: inherit; }
    /* University markers — permanent labels */
    .uni-pin {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; pointer-events: none;
    }
    .uni-pin__dot {
      width: 26px; height: 26px;
      background: rgba(80,100,180,0.1);
      border: 1.5px solid rgba(80,100,180,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }
    .uni-pin__name {
      font-size: 10px; font-weight: 700;
      color: rgba(60,80,180,0.85);
      background: rgba(255,255,255,0.92);
      border-radius: 4px; padding: 1px 5px;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      letter-spacing: 0;
    }
  </style>
</head>
<body data-view="list">

  <!-- TOP NAV -->
  <header class="nav">
    <div class="nav__logo">MORNING <em>TW</em></div>
    <nav class="nav__links">
      <button class="nav__tab tab--active" data-tab="list" data-action="list">早餐店</button>
      <button class="nav__tab" data-tab="map">🗺️ 地圖</button>
    </nav>
    <div class="nav__right">
      <div id="nav-auth">
        <button class="nav__login-btn" id="btn-login">登入</button>
      </div>
      <a href="#hero" class="nav__cta">找早餐 ↑</a>
    </div>
  </header>

  <!-- ═══ HERO ═══ -->
  <section class="hero" id="hero">
    <div class="hero__inner">
      <div class="hero__badge">🥚 台中早餐地圖</div>
      <h1 class="hero__title">MORNING TW<br><em>找早餐</em></h1>
      <p class="hero__desc">台中人自己整理的在地早餐。傳統老店、市場早點、在地限定。</p>

      <!-- BIG SEARCH -->
      <div class="hero__search" role="search">
        <span class="hero__search-icon">🔍</span>
        <input
          id="search-input"
          type="search"
          placeholder="搜尋店名或食物..."
          autocomplete="off"
          aria-label="搜尋早餐店"
        >
        <button id="search-btn" class="hero__search-btn">搜尋</button>
      </div>
      <!-- FOOD PHOTO CIRCLES -->
      <div class="hero__photos">
        <a href="#list-section" class="hero__photo-item">
          <img src="/photos/tc016.jpg" alt="蛋餅">
          <span>蛋餅</span>
        </a>
        <a href="#list-section" class="hero__photo-item">
          <img src="/photos/tc002.jpg" alt="燒餅">
          <span>燒餅</span>
        </a>
        <a href="#list-section" class="hero__photo-item hero__photo-item--center">
          <img src="/photos/tc031.jpg" alt="米糕">
          <span>米糕</span>
        </a>
        <a href="#list-section" class="hero__photo-item">
          <img src="/photos/tc024.jpg" alt="粉漿蛋餅">
          <span>粉漿蛋餅</span>
        </a>
        <a href="#list-section" class="hero__photo-item">
          <img src="/photos/tc036.jpg" alt="越南麵包">
          <span>越南麵包</span>
        </a>
      </div>
      <a href="#list-section" class="hero__browse">瀏覽全部 63 間早餐店 ↓</a>
    </div>

    <!-- MARQUEE -->
    <div class="marquee-wrap" aria-hidden="true">
      <div class="marquee">
        <div class="marquee__track" id="marquee-track">
          <!-- filled by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- ═══ FILTER + LIST ═══ -->
  <section class="list-section" id="list-section">
    <div class="list-section__inner">

      <!-- NEARBY STRIP — 永遠顯示，點選即定位 -->
      <div class="nearby-strip" id="nearby-strip">
        <div class="nearby-strip__loc" id="nearby-loc-btn">
          <span class="nearby-strip__dot" id="nearby-dot"></span>
          <span class="nearby-strip__loc-label" id="nearby-loc-label">點選定位</span>
        </div>
        <div class="nearby-strip__radii" id="radius-bar">
          <button class="nearby-btn" data-radius="0.3">300m</button>
          <button class="nearby-btn nearby-btn--md" data-radius="0.5">500m</button>
          <button class="nearby-btn" data-radius="1">1km</button>
          <button class="nearby-btn nearby-btn--all nearby-btn--active" data-radius="all">全部</button>
        </div>
      </div>

      <!-- TRANSPORT MODE STRIP -->
      <div class="transport-strip" id="transport-strip">
        <span class="transport-strip__label">我要怎麼去？</span>
        <div class="transport-strip__btns">
          <button class="transport-btn" data-mode="walk">🚶 走路</button>
          <button class="transport-btn transport-btn--active" data-mode="scooter">🛵 機車</button>
          <button class="transport-btn" data-mode="car">🚗 開車</button>
        </div>
      </div>

      <!-- STICKY FILTER ZONE -->
      <div class="sticky-filters" id="sticky-filters">
        <!-- SORT BAR -->
        <div class="sort-bar" id="sort-bar">
          <button class="sort-tab sort-tab--active" data-sort="popular">🔥 人氣</button>
          <button class="sort-tab" data-sort="featured">⭐ 精選</button>
          <button class="sort-tab" data-sort="distance">📍 距離</button>
          <span class="sort-bar__sep"></span>
          <button class="sort-tab" id="btn-open-now">🕐 現在營業</button>
          <button class="sort-tab" id="btn-favs-filter">❤️ 收藏</button>
        </div>

        <!-- FILTER BAR -->
        <div class="filter-bar">
          <div class="filter-bar__chips" id="type-chips">
            <button class="chip chip--active" data-type="all">全部</button>
            <button class="chip chip--cat" data-type="traditional">🍳 傳統</button>
            <button class="chip chip--cat" data-type="western">🥐 西式</button>
            <button class="chip chip--cat" data-type="favorites">❤️ 收藏</button>
            <span class="chip-divider">|</span>
            <button class="chip chip--sub" data-type="egg">蛋餅</button>
            <button class="chip chip--sub" data-type="rice">飯糰</button>
            <button class="chip chip--sub" data-type="soup">湯品</button>
            <button class="chip chip--sub" data-type="local">在地</button>
            <button class="chip chip--sub" data-type="drink">豆漿</button>
            <span class="chip-divider">|</span>
            <button class="chip chip--sub chip--ac" data-type="ac">❄️ 有冷氣</button>
          </div>
          <div class="filter-bar__chips" id="district-chips" style="margin-top:8px">
            <button class="chip chip--district chip--active" data-district="all">全台中</button>
            <button class="chip chip--district" data-district="南區">南區</button>
            <button class="chip chip--district" data-district="南屯區">南屯</button>
            <button class="chip chip--district" data-district="中區">中區</button>
            <button class="chip chip--district" data-district="西區">西區</button>
            <button class="chip chip--district" data-district="北區">北區</button>
            <button class="chip chip--district" data-district="西屯區">西屯</button>
            <button class="chip chip--district" data-district="北屯區">北屯</button>
            <button class="chip chip--district" data-district="東區">東區</button>
            <button class="chip chip--district" data-district="大里區">大里</button>
            <button class="chip chip--district" data-district="霧峰區">霧峰</button>
          </div>
          <div class="filter-bar__stats" id="stats-bar">
            找到 <strong id="stats-count">0</strong><span id="stats-label"> 間</span>
          </div>
        </div>
      </div>

      <!-- GRID -->
      <div class="shop-grid" id="breakfast-list">
        <p class="loading-msg">載入中⋯</p>
      </div>

    </div>
  </section>

  <!-- ═══ MAP ═══ -->
  <section class="map-section" id="map-section">
    <div class="map-section__inner">
      <div class="map-section__header">
        <h2>台中早餐地圖 <span>點圖示看店家</span></h2>
        <button class="btn-locate" id="btn-locate">📍 找我附近的</button>
      </div>
      <div class="map-wrap">
        <div id="map-container"></div>
      </div>
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="footer__logo">MORNING <em>TW</em></div>
    <p>台中人自己整理的在地早餐地圖</p>
    <p class="footer__copy">© 2026 MORNING TW</p>
  </footer>

  <!-- MOBILE BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="bnav__item bnav__item--active" data-tab="list" data-action="home">
      <span>🏠</span>首頁
    </button>
    <button class="bnav__item" data-tab="list" data-action="list">
      <span>🍳</span>早餐店
    </button>
    <button class="bnav__item" data-tab="list" data-action="search">
      <span>🔍</span>搜尋
    </button>
    <button class="bnav__item" data-tab="map">
      <span>🗺️</span>地圖
    </button>
  </nav>

  <!-- SHEET -->
  <div class="sheet-overlay" id="sheet-overlay"></div>
  <div class="bottom-sheet" id="bottom-sheet" role="dialog" aria-modal="true"></div>

  <!-- MEMBER PANEL -->
  <div class="member-overlay" id="member-overlay"></div>
  <div class="member-panel" id="member-panel" role="dialog" aria-modal="true"></div>

  <!-- AI RECOMMENDER -->
  <button id="btn-ai-pick" class="ai-pick-fab" aria-label="AI 為你推薦早餐">
    <span class="ai-pick-fab__sparkle">✨</span>
    <span class="ai-pick-fab__label">不知道吃什麼？</span>
  </button>

  <div id="ai-pick-overlay" class="ai-pick-overlay" aria-hidden="true">
    <div class="ai-pick-panel" role="dialog" aria-modal="true">
      <div class="ai-pick-progress"><div id="ai-progress-bar"></div></div>
      <div class="ai-pick-header">
        <div class="ai-pick-header__left">
          <!-- 夭獸 SVG 小角色 -->
          <div class="yaoshou-avatar" id="yaoshou-avatar">
            <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" class="yaoshou-svg">
              <!-- 耳朵 -->
              <ellipse cx="12" cy="15" rx="7" ry="9" fill="#F5A623"/>
              <ellipse cx="44" cy="15" rx="7" ry="9" fill="#F5A623"/>
              <ellipse cx="12" cy="16" rx="4" ry="6" fill="#FFD9A8"/>
              <ellipse cx="44" cy="16" rx="4" ry="6" fill="#FFD9A8"/>
              <!-- 身體 -->
              <circle cx="28" cy="33" r="21" fill="#F5A623"/>
              <!-- 眼白 -->
              <circle cx="21" cy="30" r="6" fill="white"/>
              <circle cx="35" cy="30" r="6" fill="white"/>
              <!-- 眼珠 -->
              <circle class="yaoshou-pupil-l" cx="22" cy="31" r="3.8" fill="#1A1A1A"/>
              <circle class="yaoshou-pupil-r" cx="36" cy="31" r="3.8" fill="#1A1A1A"/>
              <!-- 亮光 -->
              <circle cx="23.5" cy="29.5" r="1.3" fill="white"/>
              <circle cx="37.5" cy="29.5" r="1.3" fill="white"/>
              <!-- 腮紅 -->
              <ellipse cx="14" cy="37" rx="5" ry="3" fill="#FF8C8C" opacity="0.4"/>
              <ellipse cx="42" cy="37" rx="5" ry="3" fill="#FF8C8C" opacity="0.4"/>
              <!-- 嘴巴（飢餓） -->
              <path class="yaoshou-mouth" d="M 20 40 Q 28 48 36 40" stroke="#333" stroke-width="1.5" stroke-linecap="round" fill="none"/>
              <path d="M 20 40 Q 28 46 36 40" fill="#E05A52" opacity="0.9"/>
              <!-- 舌頭 -->
              <ellipse cx="28" cy="44" rx="4" ry="2.5" fill="#FF6B6B"/>
            </svg>
          </div>
          <div>
            <div class="ai-pick-header__name">夭獸 <span class="yaoshou-tag">超餓</span></div>
            <div class="ai-pick-header__sub">幫你找到台中最棒的早餐！</div>
          </div>
        </div>
        <button class="ai-pick-close" id="btn-ai-close">✕</button>
      </div>
      <div class="ai-pick-chat" id="ai-pick-chat"></div>
      <div class="ai-pick-options" id="ai-pick-options"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/recommender.js"></script>
</body>
</html>
